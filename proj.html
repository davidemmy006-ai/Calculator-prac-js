<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <h1 class="title">A Basic Calculator</h1>
    <main>
        <div id="edges">
            <div id="cont">
            <button class="res"><strong>C</strong></button>
            <div id="display"><input type="text" id="inputs" readonly></div>
            </div>
            <div id="input">
                <div>
                <button class="but">7</button>
                <button class="but">8</button>
                <button class="but">9</button>
                <button class="but">+</button>
                </div>
                <div>
                <button class="but">4</button>
                <button class="but">5</button>
                <button class="but">6</button>
                <button class="but">-</button>
                </div>
                <div>
                <button class="but">1</button>
                <button class="but">2</button>
                <button class="but">3</button>
                <button class="but">/</button>
                </div>
                <div>
                <button class="but">0</button>
                <button class="but">.</button>
                <button class="but">=</button>
                <button class="but">x</button>
                </div>
            </div>
        </div>
    </main>
    <footer>Made By KingDavid Eniola Emmanuel using HTML, CSS & JS</footer>
    <script>

        const display = document.getElementById('inputs');
        const buttons = document.querySelectorAll('.but');
        const clearBtn = document.querySelector('.res');

        buttons.forEach(function(button) {
        button.addEventListener('click', function() {
        const value = button.textContent;

        if (value === '=') {
            calculate();
        } else {
            display.value += value;
        }
        });
        });

        clearBtn.addEventListener('click', function() {
        display.value = '';
        });

        function calculate() {
        let expression = display.value;
        expression = expression.replace(/x/g, '*');
        try {
        display.value = eval(expression);
        } catch (error) {
        display.value = 'Error';
        }
        }

    </script>
</body>
</html>
